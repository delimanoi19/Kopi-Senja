<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Kopi Senja</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Kopi Senja</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="signin.html">Sign In</a></li>
        </ul>
    </nav>

    <section class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>Daftar Akun</h2>
                <p>Mulai perjalanan rasa Anda di Kopi Senja</p>
            </div>

            <form action="#" class="contact-form">
                <div class="form-group">
                    <label for="name">Nama Lengkap</label>
                    <input type="text" id="name" placeholder="Masukkan nama Anda" required>
                </div>

                <div class="form-group">
                    <label for="email">Alamat Email</label>
                    <input type="email" id="email" placeholder="contoh@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <input type="password" id="password" placeholder="Buat kata sandi baru" required>
                </div>

                <div class="form-group">
                    <label for="confirm">Konfirmasi Kata Sandi</label>
                    <input type="password" id="confirm" placeholder="Ulangi kata sandi" required>
                </div>

                <button type="submit" class="submit-btn">Daftar Sekarang</button>

                <div class="auth-footer" style="margin-top: 20px; text-align: center; font-size: 14px;">
                    <p style="color: #6e5248;">Sudah punya akun? <a href="signin.html" style="color: #4a332d; font-weight: bold; text-decoration: none;">Masuk di sini</a></p>
                </div>
            </form>
        </div>
    </section>

</body>
</html>
