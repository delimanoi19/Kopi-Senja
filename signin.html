<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Kopi Senja</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Kopi Senja</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="signin.html" class="active">Sign In</a></li>
        </ul>
    </nav>

    <section class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>Selamat Datang</h2>
                <p>Silakan masuk untuk melanjutkan pesanan Anda</p>
            </div>

            <form action="#" class="auth-form">
                <div class="form-group">
                    <label for="email">Email atau Username</label>
                    <input type="email" id="email" placeholder="contoh@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <input type="password" id="password" placeholder="Masukkan kata sandi" required>
                    <a href="#" class="forgot-link">Lupa kata sandi?</a>
                </div>

                <button type="submit" class="auth-btn">Masuk</button>

                <div class="auth-footer">
                    <p>Belum punya akun? <a href="signup.html">Daftar Sekarang</a></p>
                </div>
            </form>
        </div>
    </section>

</body>
</html>
